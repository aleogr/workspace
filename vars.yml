# Usuário
new_user: "aleogr"
user_shell: "/bin/bash"

# Sistema
debian_codename: "trixie"

# --- CONFIGURAÇÃO DE DISCO ÚNICO ---
# O Proxmox está instalado no NVMe de 512GB (rpool).
# O WD Black 2TB (Windows) NÃO deve ser listado aqui.
pool_name: "rpool" 
storage_id_vm: "local-zfs" 

# Limite de RAM para ZFS (ARC) - 4GB é ideal para 512GB de disco
zfs_arc_limit_bytes: 4294967296 

# Backup (PBS) interno no rpool
pbs_datastore: "Backup-Internal"
pbs_user: "root@pam"

# CPU
cpu_governor: "powersave"
