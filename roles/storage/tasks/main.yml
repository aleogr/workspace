---
- name: Detectar ambiente
  ansible.builtin.debug:
    msg: "Modo: Single Disk no pool {{ pool_name }}. O disco de 2TB será preservado para Dual-Boot."

- name: Verificar se o Pool de Sistema existe
  ansible.builtin.command: zpool list {{ pool_name }}
  register: pool_check
  failed_when: pool_check.rc != 0
  changed_when: false

- name: Criar Datasets Organizacionais (Nativo)
  community.general.zfs:
    name: "{{ item }}"
    state: present
  loop:
    - "{{ pool_name }}/vms"
    - "{{ pool_name }}/backups"

- name: Garantir permissões do Storage no Proxmox
  ansible.builtin.command: >
    pvesm set {{ storage_id_vm }} --content images,rootdir,vztmpl,iso,snippets
  changed_when: false

# --- SWAP CONFIGURATION (NATIVE & IDEMPOTENT) ---
- name: Criar ZVol de Swap
  community.general.zfs:
    name: "{{ pool_name }}/swap"
    state: present
    extra_zfs_properties:
      volsize: 8G
      compression: zle
      logbias: throughput
      sync: always
      primarycache: metadata
      secondarycache: none
      com.sun:auto-snapshot: "false"

- name: Formatar ZVol como Swap
  ansible.builtin.command: mkswap -f /dev/zvol/{{ pool_name }}/swap
  register: mkswap_res
  changed_when: "'setting up swapspace' in mkswap_res.stdout"
  # Só formata se não houver assinatura de swap válida
  when: ansible_devices.zvol is not defined 

- name: Ativar Swap e Persistir no Fstab
  ansible.posix.mount:
    path: none
    src: /dev/zvol/{{ pool_name }}/swap
    fstype: swap
    opts: sw
    state: present

- name: Configurar Swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: '10'
    state: present
